<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Daily Report</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { font-weight: bold; margin-top: 10px; display: block; }
input, select, textarea { margin-top:4px; margin-bottom:10px; padding:6px; width:220px; box-sizing:border-box;}
textarea { width:100%; height:40px; resize:vertical;}
button { padding:8px 15px; margin-top:10px; cursor:pointer;}
table { width:100%; border-collapse: collapse; margin-top:20px; font-size:14px;}
th, td { border:1px solid #888; padding:6px 8px; text-align:center;}
th { background-color:#eee; }
.short { width:120px;}
#alertExcel { margin-top:15px; background-color:#f8d7da; border:1px solid #f5c6cb; color:#721c24; padding:10px; font-weight:bold; }
</style>
</head>
<body>

<h2>Driver Daily Report</h2>

<label>Vehicle:</label>
<input type="text" id="vehicle">

<label>Run:</label>
<input type="text" id="run">

<hr>

<label>Collection and Delivery Specification:</label>
<select id="specification">
  <option value="">Select specification</option>
  <option>Collection Only</option>
  <option>Delivery Only</option>
  <option>Collection and Delivery</option>
</select>

<label>Collection and Delivery Point:</label>
<select id="location">
  <option value="">Select</option>
  <option>AC</option>
  <option>ASC</option>
  <option>BA WC</option>
  <option>Dnata CP</option>
  <option>Swissport</option>
  <option>BREAK</option>
</select>

<label>Arrival Time:</label>
<input type="time" id="arrival">

<label>Booking Time:</label>
<input type="time" id="booking">

<label>Loading:</label>
<input type="time" id="loading">

<label>Departure:</label>
<input type="time" id="departure">

<label>Comment:</label>
<textarea id="comment"></textarea>

<button id="addEntryBtn">Add Location</button>

<hr>

<label>Select Date to View / Generate Excel:</label>
<input type="date" id="filterDate">

<div id="alertExcel">
⚠️ After adding all locations, click <strong>Send Excel</strong> to save report.
</div>

<button id="sendExcelBtn">Send Excel</button>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Loading</th>
<th>Departure</th>
<th>Specification</th>
<th>Comment</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const HOURLY_RATE = 37.5;
let dailyData = JSON.parse(localStorage.getItem('dailyData')||"{}");

window.onload = function(){
  filterDate.value = new Date().toISOString().split('T')[0];
  loadTable();
};

function loadTable(date=new Date().toISOString().split('T')[0]){
  const tbody=document.querySelector("#reportTable tbody");
  tbody.innerHTML="";
  if(!dailyData[date]) return;

  Object.keys(dailyData[date]).forEach(run=>{
    dailyData[date][run].forEach(entry=>{
      const row=tbody.insertRow();
      Object.values(entry).forEach(val=>{
        row.insertCell().textContent=val;
      });
    });
  });
}

filterDate.addEventListener('change', function(){
  loadTable(this.value);
});

addEntryBtn.addEventListener('click', function(){

  const vehicle=vehicle.value.trim();
  const run=run.value.trim();
  const date=new Date().toISOString().split('T')[0];
  const specification=specification.value;
  const location=location.value;
  const arrival=arrival.value;
  const booking=booking.value;
  const loading=loading.value;
  const departure=departure.value;
  const comment=comment.value.trim();

  if(!vehicle||!run||!location||!specification)
    return alert("Fill required fields");

  if(!dailyData[date]) dailyData[date]={};
  if(!dailyData[date][run]) dailyData[date][run]=[];

  dailyData[date][run].push({date,vehicle,run,location,arrival,booking,loading,departure,specification,comment});
  localStorage.setItem('dailyData',JSON.stringify(dailyData));
  loadTable(date);
});

function timeToMinutes(t){
  if(!t) return null;
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function roundTo30(mins){
  let remainder = mins % 30;
  if(remainder <= 15) return mins - remainder;
  return mins + (30 - remainder);
}

sendExcelBtn.addEventListener('click', function(){

  const selectedDate=filterDate.value;
  if(!dailyData[selectedDate])
    return alert("No data for date");

  let arrivals=[];
  let departures=[];
  let rows=[];

  Object.keys(dailyData[selectedDate]).forEach(run=>{
    dailyData[selectedDate][run].forEach(entry=>{
      rows.push([
        entry.date,
        entry.vehicle,
        entry.run,
        entry.location,
        entry.arrival,
        entry.booking,
        entry.loading,
        entry.departure,
        entry.specification,
        entry.comment
      ]);

      if(entry.arrival) arrivals.push(timeToMinutes(entry.arrival));
      if(entry.departure) departures.push(timeToMinutes(entry.departure));
    });
  });

  let totalHours = 0;

  if(arrivals.length && departures.length){
    let start=Math.min(...arrivals);
    let end=Math.max(...departures);
    let duration=end-start;
    duration=roundTo30(duration);
    totalHours=duration/60;
  }

  let totalCost = totalHours * HOURLY_RATE;

  const sheetData = [
    ["TOTAL HOURS", totalHours],
    ["HOURLY RATE (£)", HOURLY_RATE],
    ["TOTAL COST (£)", totalCost],
    [],
    ["Date","Vehicle","Run","Location","Arrival","Booking","Loading","Departure","Specification","Comment"],
    ...rows
  ];

  const ws = XLSX.utils.aoa_to_sheet(sheetData);

  ws["B1"].z = "0.00";
  ws["B2"].z = "£0.00";
  ws["B3"].z = "£0.00";

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Daily Report");

  XLSX.writeFile(wb,"Driver_Report_"+selectedDate+".xlsx");
});
</script>

</body>
</html>
