<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPLG Run Sheet - Drag & Drop</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f9f9f9;
  }

  h1, h3 {
    color: #333;
  }

  .dragDropContainer {
    max-width: 400px;
    margin-top: 20px;
    padding: 20px;
    border: 1px solid #aaa;
    border-radius: 8px;
    background-color: #fafafa;
  }

  .dragDropContainer h3 {
    margin-bottom: 12px;
  }

  ul {
    list-style-type: none;
    padding: 0;
  }

  li {
    padding: 8px 12px;
    margin: 6px 0;
    background-color: #f0f8ff;
    border: 1px solid #888;
    border-radius: 4px;
    cursor: grab;
  }

  #dropZone {
    min-height: 150px;
    background-color: #fff0f0;
    border: 2px dashed #aa0000;
    padding: 15px;
    margin-top: 20px;
    border-radius: 6px;
  }

  .droppedItem {
    padding: 6px 10px;
    margin: 4px 0;
    background-color: #d0ffd0;
    border: 1px solid #0c0;
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1>GPLG Run Sheet</h1>

<!-- Collection & Delivery Specification List -->
<div class="dragDropContainer">
  <h3>Collection & Delivery Specification</h3>
  <ul id="specList">
    <li draggable="true" class="draggable">Collection</li>
    <li draggable="true" class="draggable">Delivery</li>
  </ul>
</div>

<!-- Collection and Delivery Points List -->
<div class="dragDropContainer">
  <h3>Collection and Delivery Points</h3>
  <ul id="pointsList">
    <li draggable="true" class="draggable">LG</li>
    <li draggable="true" class="draggable">AC</li>
    <li draggable="true" class="draggable">BA WC</li>
    <li draggable="true" class="draggable">Dnata CX</li>
    <li draggable="true" class="draggable">BREAK</li>
    <li draggable="true" class="draggable">LANDMARK GLOBAL</li>
  </ul>
</div>

<!-- Drop Zone -->
<div id="dropZone">
  <h3>Drop Here</h3>
</div>

<script>
  const draggables = document.querySelectorAll('.draggable');
  const dropZone = document.getElementById('dropZone');

  draggables.forEach(item => {
    item.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', e.target.innerText);
    });
  });

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    const data = e.dataTransfer.getData('text/plain');

    const newItem = document.createElement('div');
    newItem.innerText = data;
    newItem.className = 'droppedItem';

    dropZone.appendChild(newItem);
  });
</script>

</body>
</html>
