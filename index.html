<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPLG Run Sheet</title>

  <!-- Stil general -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1, h2, h3 {
      color: #333;
    }

    /* Stil drag & drop Collection & Delivery Specification */
    #taskList {
      list-style-type: none;
      padding: 0;
    }

    #taskList li {
      padding: 8px 12px;
      margin: 4px;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      cursor: grab;
    }

    #dropZone {
      margin-top: 20px;
      padding: 20px;
      border: 2px dashed #aaa;
      min-height: 50px;
    }

    /* Opțional: stil nou pentru item-urile drop-uite */
    .droppedItem {
      padding: 6px 10px;
      margin: 4px;
      background-color: #d0ffd0;
      border: 1px solid #0c0;
    }
  </style>
</head>
<body>

  <h1>GPLG Run Sheet</h1>

  <!-- Alte secțiuni ale paginii tale aici -->
  <p>Secțiuni existente...</p>

  <!-- Collection & Delivery Specification Drag & Drop -->
  <div id="dragDropContainer">
    <h3>Collection & Delivery Specification</h3>
    <ul id="taskList">
      <li draggable="true" class="draggable">Collection</li>
      <li draggable="true" class="draggable">Delivery</li>
    </ul>
  </div>

  <div id="dropZone">
    <h3>Drop Here</h3>
  </div>

  <!-- Script drag & drop -->
  <script>
    const draggables = document.querySelectorAll('.draggable');
    const dropZone = document.getElementById('dropZone');

    draggables.forEach(item => {
      item.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', e.target.innerText);
      });
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault(); // permite drop
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      const data = e.dataTransfer.getData('text/plain');
      
      const newItem = document.createElement('div');
      newItem.innerText = data;
      newItem.className = 'droppedItem';
      
      dropZone.appendChild(newItem);
    });
  </script>

  <!-- Comentarii finale ale paginii -->
  <!-- Footer / notes / end of file -->
</body>
</html>
