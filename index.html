<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Daily Report</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { font-weight: bold; display: block; margin-top: 10px; }
input, select { margin-bottom: 10px; padding: 5px; }
input.short { width: 120px; }
input.comment { width: 100%; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #000; padding: 8px; text-align: center; }
#alertExcel { background-color: #ffcccc; color: #990000; border: 2px solid #990000; padding: 15px; font-size: 18px; text-align: center; margin: 15px 0; font-weight: bold; }
#alertBlock { background-color: #ffe0b3; color: #993d00; border: 2px solid #993d00; padding: 15px; font-size: 18px; text-align: center; margin: 15px 0; font-weight: bold; }
button { padding: 10px 20px; font-size: 16px; margin-top: 10px; }
</style>
</head>
<body>

<h2>Driver Daily Report</h2>

<div id="alertBlock" style="display:none;">
⚠️ Cannot start new day: yesterday's report not generated!
</div>

<label>Vehicle:</label>
<input type="text" id="vehicle" class="short" placeholder="Vehicle #">

<label>Run:</label>
<input type="number" id="run" class="short">

<label>Date:</label>
<input type="date" id="date" class="short">

<hr>

<label>Collection and Delivery Point:</label>
<select id="location" onchange="checkManual()" class="short">
    <option value="">Select</option>
    <option>AC</option>
    <option>ASC</option>
    <option>BA WC</option>
    <option>BA WC 2nd</option>
    <option>Ba XPS</option>
    <option>DAI</option>
    <option>Dnata CP</option>
    <option>Dnata CX</option>
    <option>Dnata U1</option>
    <option>Dnata U2</option>
    <option>Dnata U3</option>
    <option>Dnata VS/Delta</option>
    <option>HCH</option>
    <option>HCH Horton</option>
    <option>JL</option>
    <option>MW</option>
    <option>Scylla Rd</option>
    <option>Scylla U1</option>
    <option>WFS 549</option>
    <option>WFS 550</option>
    <option>ECMS</option>
    <option>Swissport</option>
    <option>BREAK</option>
    <option value="manual">Other (Manual)</option>
</select>
<input type="text" id="manualLocation" class="short" placeholder="Enter location" style="display:none; margin-bottom:10px;">

<label>Booking Time:</label>
<input type="time" id="booking" class="short">

<label>Arrival Time:</label>
<input type="time" id="arrival" class="short">

<label>Loading:</label>
<input type="time" id="loading" class="short">

<label>Departure:</label>
<input type="time" id="departure" class="short">

<label>Comment:</label>
<input type="text" id="comment" class="comment" placeholder="Add comment">

<button onclick="addEntry()">Add Location</button>

<div id="alertExcel">
⚠️ Important: After adding all locations, make sure to click <strong>Send Excel</strong> to save your daily report locally! ⚠️
</div>

<button onclick="sendExcel()">Send Excel</button>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Collection and Delivery Point</th>
<th>Booking Time</th>
<th>Arrival Time</th>
<th>Loading</th>
<th>Departure</th>
<th>Comment</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// auto-skip timp doar la Enter sau Tab
const timeFields = ['booking','arrival','loading','departure'];
timeFields.forEach((id,index)=>{
    document.getElementById(id).addEventListener('keydown', function(e){
        if(e.key === "Enter" || e.key === "Tab"){
            e.preventDefault();
            const next=timeFields[index+1];
            if(next) document.getElementById(next).focus();
        }
    });
});

function checkManual(){
    const loc=document.getElementById("location").value;
    document.getElementById("manualLocation").style.display=loc==="manual"?"block":"none";
}

// ===== Storage =====
let todayStr = new Date().toISOString().split('T')[0];
let dailyData = JSON.parse(localStorage.getItem('dailyData')||"{}");
let generatedDays = JSON.parse(localStorage.getItem('generatedDays')||"{}");

// check yesterday
let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
let yesterdayStr = yesterday.toISOString().split('T')[0];
function checkYesterday(){
    if(dailyData[yesterdayStr] && !generatedDays[yesterdayStr]){
        document.getElementById("alertBlock").style.display="block";
        document.querySelectorAll('input, select, button').forEach(el=>{
            if(!el.innerText.includes("Send Excel")) el.disabled=true;
        });
    } else {
        document.getElementById("alertBlock").style.display="none";
        document.querySelectorAll('input, select, button').forEach(el=>{
            el.disabled=false;
        });
    }
}
checkYesterday();

// load saved global values
window.onload=function(){
    if(localStorage.getItem('vehicle')) document.getElementById('vehicle').value=localStorage.getItem('vehicle');
    if(localStorage.getItem('run')) document.getElementById('run').value=localStorage.getItem('run');
    if(localStorage.getItem('date')) document.getElementById('date').value=localStorage.getItem('date');

    if(!document.getElementById('booking').value) document.getElementById('booking').value="08:00";
    if(!document.getElementById('arrival').value) document.getElementById('arrival').value="08:30";
    if(!document.getElementById('loading').value) document.getElementById('loading').value="08:45";
    if(!document.getElementById('departure').value) document.getElementById('departure').value="09:00";

    loadTable();
};

function getRunKey(){ return document.getElementById('run').value; }

function loadTable(){
    const tbody=document.getElementById('reportTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML="";
    const runKey=getRunKey();
    if(!runKey) return;
    if(dailyData[todayStr] && dailyData[todayStr][runKey]){
        dailyData[todayStr][runKey].forEach(entry=>{
            const row=tbody.insertRow();
            Object.values(entry).forEach(v=>{
                const cell=row.insertCell();
                cell.innerText=v;
                cell.contentEditable=true;
            });
        });
    }
}

function addEntry(){
    const vehicle=document.getElementById('vehicle').value;
    const run=document.getElementById('run').value;
    const date=document.getElementById('date').value;
    const locationSelect=document.getElementById('location').value;
    const location=locationSelect==="manual"?document.getElementById('manualLocation').value:locationSelect;
    const booking=document.getElementById('booking').value;
    const arrival=document.getElementById('arrival').value;
    const loading=document.getElementById('loading').value;
    const departure=document.getElementById('departure').value;
    const comment=document.getElementById('comment').value;

    if(!vehicle||!run||!date||!location){alert("Please fill all required fields!"); return;}

    localStorage.setItem('vehicle',vehicle);
    localStorage.setItem('run',run);
    localStorage.setItem('date',date);

    if(!dailyData[todayStr]) dailyData[todayStr]={};
    if(!dailyData[todayStr][run]) dailyData[todayStr][run]=[];

    const entry={date,vehicle,run,location,booking,arrival,loading,departure,comment};
    dailyData[todayStr][run].push(entry);
    localStorage.setItem('dailyData',JSON.stringify(dailyData));

    loadTable();

    document.getElementById("location").value="";
    document.getElementById("manualLocation").value="";
    document.getElementById("manualLocation").style.display="none";
    timeFields.forEach(f=>document.getElementById(f).value="");
    document.getElementById("comment").value="";
}

function sendExcel(){
    const tbody=document.getElementById('reportTable').getElementsByTagName('tbody')[0];
    const rows=tbody.getElementsByTagName('tr');
    const data=[];
    for(let r=0;r<rows.length;r++){
        const cells=rows[r].getElementsByTagName('td');
        const rowData={};
        rowData['Date']=cells[0].innerText;
        rowData['Vehicle']=cells[1].innerText;
        rowData['Run']=cells[2].innerText;
        rowData['Collection and Delivery Point']=cells[3].innerText;
        rowData['Booking Time']=cells[4].innerText;
        rowData['Arrival Time']=cells[5].innerText;
        rowData['Loading']=cells[6].innerText;
        rowData['Departure']=cells[7].innerText;
        rowData['Comment']=cells[8].innerText;
        data.push(rowData);
    }

    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,"DailyReport");

    const wbout=XLSX.write(wb,{bookType:'xlsx', type:'array'});
    const blob=new Blob([wbout],{type:"application/octet-stream"});
    const url=URL.createObjectURL(blob);

    const a=document.createElement('a');
    a.href=url;
    a.download=`DriverDailyReport_Run${document.getElementById('run').value}_${document.getElementById('date').value}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);

    generatedDays[todayStr]=true;
    localStorage.setItem('generatedDays',JSON.stringify(generatedDays));
    checkYesterday();
    alert("Excel generated! You can now quickly attach it to an email.");
}
</script>
</body>
</html>
</body>
</html>
